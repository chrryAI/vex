name: Publish Browser Extensions

on:
  push:
    tags:
      - extension-v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site:
          [
            sushi,
            atlas,
            focus,
            vex,
            popcorn,
            chrry,
            zarathustra,
            search,
            grape,
            burn,
            vault,
            pear,
            tribe,
          ]

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build Chrome extension for ${{ matrix.site }}
        run: pnpm --filter @repo/extension build:chrome:${{ matrix.site }}

      - name: Verify build artifacts exist
        run: |
          set -e
          test -f apps/extension/dist-chrome-${{ matrix.site }}.zip || (echo "Missing dist-chrome-${{ matrix.site }}.zip" && exit 1)

      - name: Create Chrome Extension Keys JSON
        id: create-chrome-json
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_EXTENSION_ID_SUSHI: ${{ secrets.CHROME_EXTENSION_ID_SUSHI }}
          CHROME_EXTENSION_ID_ATLAS: ${{ secrets.CHROME_EXTENSION_ID_ATLAS }}
          CHROME_EXTENSION_ID_FOCUS: ${{ secrets.CHROME_EXTENSION_ID_FOCUS }}
          CHROME_EXTENSION_ID_VEX: ${{ secrets.CHROME_EXTENSION_ID_VEX }}
          CHROME_EXTENSION_ID_POPCORN: ${{ secrets.CHROME_EXTENSION_ID_POPCORN }}
          CHROME_EXTENSION_ID_CHRRY: ${{ secrets.CHROME_EXTENSION_ID_CHRRY }}
          CHROME_EXTENSION_ID_ZARATHUSTRA: ${{ secrets.CHROME_EXTENSION_ID_ZARATHUSTRA }}
          CHROME_EXTENSION_ID_SEARCH: ${{ secrets.CHROME_EXTENSION_ID_SEARCH }}
          CHROME_EXTENSION_ID_GRAPE: ${{ secrets.CHROME_EXTENSION_ID_GRAPE }}
          CHROME_EXTENSION_ID_BURN: ${{ secrets.CHROME_EXTENSION_ID_BURN }}
          CHROME_EXTENSION_ID_VAULT: ${{ secrets.CHROME_EXTENSION_ID_VAULT }}
          CHROME_EXTENSION_ID_PEAR: ${{ secrets.CHROME_EXTENSION_ID_PEAR }}
          CHROME_EXTENSION_ID_TRIBE: ${{ secrets.CHROME_EXTENSION_ID_TRIBE }}
        run: |
          # Dynamically map the secret name based on matrix site
          case "${{ matrix.site }}" in
            sushi) EXT_ID="$CHROME_EXTENSION_ID_SUSHI" ;;
            atlas) EXT_ID="$CHROME_EXTENSION_ID_ATLAS" ;;
            focus) EXT_ID="$CHROME_EXTENSION_ID_FOCUS" ;;
            vex) EXT_ID="$CHROME_EXTENSION_ID_VEX" ;;
            popcorn) EXT_ID="$CHROME_EXTENSION_ID_POPCORN" ;;
            chrry) EXT_ID="$CHROME_EXTENSION_ID_CHRRY" ;;
            zarathustra) EXT_ID="$CHROME_EXTENSION_ID_ZARATHUSTRA" ;;
            search) EXT_ID="$CHROME_EXTENSION_ID_SEARCH" ;;
            grape) EXT_ID="$CHROME_EXTENSION_ID_GRAPE" ;;
            burn) EXT_ID="$CHROME_EXTENSION_ID_BURN" ;;
            vault) EXT_ID="$CHROME_EXTENSION_ID_VAULT" ;;
            pear) EXT_ID="$CHROME_EXTENSION_ID_PEAR" ;;
            tribe) EXT_ID="$CHROME_EXTENSION_ID_TRIBE" ;;
          esac

          if [[ -z "$EXT_ID" ]]; then
            echo "::warning::Extension ID not found for ${{ matrix.site }}. Skipping upload."
            echo "skip_upload=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Prepare Keys JSON for PlasmoHQ/bpp
          JSON_CONTENT=$(jq -n \
            --arg clientId "$CHROME_CLIENT_ID" \
            --arg clientSecret "$CHROME_CLIENT_SECRET" \
            --arg refreshToken "$CHROME_REFRESH_TOKEN" \
            --arg extId "$EXT_ID" \
            '{
              "$schema": "https://github.com/PlasmoHQ/bpp/raw/main/keys.schema.json",
              "chrome": {
                "clientId": $clientId,
                "clientSecret": $clientSecret,
                "refreshToken": $refreshToken,
                "extId": $extId
              }
            }')

          echo "BPP_KEYS<<EOF" >> $GITHUB_OUTPUT
          echo "$JSON_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "skip_upload=false" >> $GITHUB_OUTPUT

      - name: Upload to Chrome Web Store
        if: steps.create-chrome-json.outputs.skip_upload == 'false'
        uses: PlasmoHQ/bpp@c15984c0a74f452851c605cab46f34d9fd6cb158 # v3.8.0
        with:
          keys: ${{ steps.create-chrome-json.outputs.BPP_KEYS }}
          chrome-file: apps/extension/dist-chrome-${{ matrix.site }}.zip
          verbose: true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: apps/extension/dist-chrome-${{ matrix.site }}.zip
          generate_release_notes: true
          # Token is automatic in GitHub Actions
          fail_on_unmatched_files: false
