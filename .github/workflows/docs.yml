name: Deploy API Documentation

on:
  push:
    branches: [main, master]
    paths:
      - "packages/**"
      - "typedoc.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build HTML documentation
        run: NODE_OPTIONS='--max-old-space-size=8192' pnpm docs:build

      - name: Build Markdown documentation
        run: NODE_OPTIONS='--max-old-space-size=8192' pnpm docs:build:markdown

      - name: Copy Markdown to HTML docs
        run: |
          mkdir -p docs/api/markdown
          cp -r docs/api-markdown/* docs/api/markdown/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/api

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
