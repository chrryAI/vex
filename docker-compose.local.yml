version: '3.8'

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vex-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vex_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-vex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    networks:
      - vex-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vex}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and sessions
  redis:
    image: redis:7.2-alpine
    container_name: vex-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      sh -c "redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD:-vex_redis_local}"
    volumes:
      - redis_data:/data
    networks:
      - vex-local
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-vex_redis_local}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO for S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: vex-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"  # API
      - "127.0.0.1:9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vex}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-vex_minio_local_password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - vex-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO Client for bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: vex-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-vex} ${MINIO_ROOT_PASSWORD:-vex_minio_local_password};
      mc mb --ignore-existing local/chrry-chat-files;
      mc mb --ignore-existing local/chrry-app-profiles;
      mc anonymous set download local/chrry-chat-files;
      mc anonymous set download local/chrry-app-profiles;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "
    networks:
      - vex-local

  # FalkorDB for Knowledge Graph
  falkordb:
    image: falkordb/falkordb:latest
    container_name: vex-falkordb
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"  # Different port to avoid Redis conflict
    volumes:
      - falkordb_data:/data
    networks:
      - vex-local
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Mailhog for local email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: vex-mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"  # SMTP
      - "127.0.0.1:8025:8025"  # Web UI
    networks:
      - vex-local
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  falkordb_data:
    driver: local

networks:
  vex-local:
    driver: bridge
