version: "3.8"

# Vex Local Stack — bundled with the Tauri desktop app
# Volumes are stored in ~/Library/Application Support/dev.chrry.tribe/
# Managed automatically by the app — do not edit manually.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vex-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vex_local}
      POSTGRES_DB: ${POSTGRES_DB:-vex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vex}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: vex-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      sh -c "redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-vex_redis_local}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-vex_redis_local}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: vex-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vex}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-vex_minio_local}
    command: server /data
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: vex-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-vex} ${MINIO_ROOT_PASSWORD:-vex_minio_local};
      mc mb --ignore-existing local/chrry-chat-files;
      mc mb --ignore-existing local/chrry-app-profiles;
      mc anonymous set download local/chrry-chat-files;
      mc anonymous set download local/chrry-app-profiles;
      echo 'MinIO buckets ready';
      exit 0;
      "

  falkordb:
    image: falkordb/falkordb:latest
    container_name: vex-falkordb
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  falkordb_data:
